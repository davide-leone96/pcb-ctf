name: Trivy Security Scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 6 * * 1" # Every Monday at 06:00 UTC

jobs:
  trivy-fs:
    name: Filesystem Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy on filesystem (table summary)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH
          exit-code: "0"

  trivy-image:
    name: Docker Image Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t pcb-ctf:${{ github.sha }} .

      - name: Run Trivy on Docker image (table summary)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: pcb-ctf:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: "0"

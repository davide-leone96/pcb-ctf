name: Trivy Security Scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 6 * * 1" # Every Monday at 06:00 UTC
  workflow_dispatch:

jobs:
  trivy-fs:
    name: Filesystem Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy on filesystem (table summary)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH
          exit-code: "0"

  trivy-image:
    name: Docker Image Scan
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: docker build -t pcb-ctf:${{ github.sha }} .

      - name: Run Trivy on Docker image (table summary)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: pcb-ctf:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: "0"

      - name: Compute tag
        run: |
          TAG="release-$(date +'%Y%m%d')-${GITHUB_SHA::7}"
          echo "TAG=$TAG" >> $GITHUB_ENV

      - name: Create git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"
          echo "::notice::Git tag created: $TAG"

      - name: Push image to GHCR
        run: |
          docker tag pcb-ctf:${{ github.sha }} ghcr.io/${{ github.repository_owner }}/pcb-ctf:$TAG
          docker push ghcr.io/${{ github.repository_owner }}/pcb-ctf:$TAG
